<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Line Distribution</title>

    <!-- ========================= -->
    <!-- CSS -->
    <!-- ========================= -->

    <link rel="stylesheet" href="css/style.css">

    <link rel="stylesheet" href="css/video.css">

    <link rel="stylesheet" href="css/ranking.css">

    <link rel="stylesheet" href="css/lyrics.css">

    <link rel="stylesheet" href="css/animations.css">

</head>

<body>

<div id="app">

    <!-- ===================================== -->
    <!-- LEFT PANEL -->
    <!-- ===================================== -->

    <section id="left-panel">

        <!-- ========================= -->
        <!-- HEADER -->
        <!-- ========================= -->

        <header id="top-bar">

            <div id="song-info">

                <h1 id="group-name">

                    NCT DREAM

                </h1>

                <h2 id="song-name">

                    Moonlight

                </h2>

            </div>

            <div id="song-time">

                <span id="current-time">

                    00:00

                </span>

                <span>

                    /

                </span>

                <span id="duration">

                    00:00

                </span>

            </div>

        </header>

        <!-- ========================= -->
        <!-- VIDEO -->
        <!-- ========================= -->

        <section id="video-section">

            <video
                id="video"
                preload="metadata"
                controls>

            </video>

        </section>

                <!-- ========================= -->
        <!-- LYRICS -->
        <!-- ========================= -->

        <section id="lyrics-container">

            <!-- LETRAS -->

            <section id="lyrics-section">

                <h2 id="current-member">


                </h2>

                <p id="hangul">


                </p>

                <p id="romanized">


                </p>

                <p id="english">


                </p>

            </section>

            <!-- AD-LIBS -->

            <aside id="adlibs-section">

                <!--
                    Los ad-libs aparecerán aquí
                    automáticamente mediante JavaScript.
                -->

            </aside>

        </section>

    </section>

    <!-- ===================================== -->
    <!-- RIGHT PANEL -->
    <!-- ===================================== -->

    <aside id="right-panel">

        <section id="ranking">

            <!--
                JavaScript generará aquí
                todas las tarjetas del ranking.
            -->

        </section>

    </aside>

        <!-- ========================= -->
    <!-- TIMELINE -->
    <!-- ========================= -->

    <section id="timeline-section">

        <div id="timeline">

            <div id="timeline-progress"></div>

        </div>

    </section>

</div>

<!-- ===================================== -->
<!-- JAVASCRIPT -->
<!-- ===================================== -->

<script src="js/config.js"></script>

<script src="js/ui.js"></script>

<script src="js/player.js"></script>

<script src="js/ranking.js"></script>

<script src="js/lyrics.js"></script>
    
<script src="js/engine.js"></script>

<script src="js/app.js"></script>

</body>

</html>
