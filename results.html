<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Line Distribution — Resultados</title>
<style>
  :root{
    --bg:#0e0e13; --panel:#171720; --text:#f2f2f7; --muted:#8a8a99;
    --gray:#33333e;           /* colourless segment */
    --grayrow:#20202a;
  }
  *{ box-sizing:border-box; }
  html,body{ margin:0; height:100%; }
  body{
    background:var(--bg); color:var(--text);
    font-family:"Segoe UI",Inter,Arial,sans-serif;
    display:flex; align-items:center; justify-content:center; gap:56px;
    padding:40px;
  }

  /* ---------- Donut ---------- */
  #chart-wrap{ position:relative; flex:0 0 auto; }
  svg{ display:block; }
  .seg{
    fill:var(--gray);
    stroke:var(--bg); stroke-width:3;
    transition:fill .45s ease, opacity .45s ease, transform .45s ease;
    transform-box:fill-box; transform-origin:center;
    cursor:pointer;
  }
  .seg.dim{ opacity:.35; }
  #hole-label{
    position:absolute; inset:0; display:flex; flex-direction:column;
    align-items:center; justify-content:center; pointer-events:none; text-align:center;
  }
  #hole-label .grp{ font-size:15px; font-weight:800; letter-spacing:2px; color:var(--muted); }
  #hole-label .sng{ font-size:20px; font-weight:800; color:var(--text); }

  /* ---------- Ranking list ---------- */
  #list{ width:420px; display:flex; flex-direction:column; gap:10px; }
  #list h2{
    margin:0 0 8px; font-size:14px; letter-spacing:3px; color:var(--muted); font-weight:800;
  }
  .row{
    display:grid; grid-template-columns:44px 1fr auto; align-items:center; gap:14px;
    background:var(--grayrow); border-radius:12px; padding:8px 14px;
    opacity:.55; transition:opacity .4s ease, background-color .4s ease, transform .2s ease;
  }
  .row .photo{
    width:40px; height:40px; border-radius:50%; object-fit:cover; object-position:center 45%;
    filter:grayscale(1) brightness(.8); transition:filter .45s ease, box-shadow .45s ease;
    background:#000;
  }
  .row .name{ font-size:20px; font-weight:800; letter-spacing:.5px; color:var(--muted); transition:color .45s ease; }
  .row .stats{ text-align:right; font-variant-numeric:tabular-nums; }
  .row .pct{ font-size:20px; font-weight:800; color:var(--muted); transition:color .45s ease; }
  .row .sec{ font-size:13px; color:var(--muted); }

  .row.lit{ opacity:1; background:var(--rowbg); }
  .row.lit .photo{ filter:none; box-shadow:0 0 0 2px var(--c); }
  .row.lit .name{ color:var(--c); }
  .row.lit .pct{ color:var(--c); }
  .row.lit .sec{ color:var(--text); }

  #hint{ position:fixed; bottom:14px; left:0; width:100%; text-align:center; color:var(--muted); font-size:13px; }
  kbd{ background:#2a2a34; border:1px solid #444; border-radius:5px; padding:2px 7px; font-weight:700; }
</style>
</head>
<body>

  <div id="chart-wrap">
    <svg id="chart" width="380" height="380" viewBox="0 0 380 380"></svg>
    <div id="hole-label"><div class="grp" id="grp"></div><div class="sng" id="sng"></div></div>
  </div>

  <div id="list">
    <h2>LINE DISTRIBUTION</h2>
    <div id="rows"></div>
  </div>

  <div id="hint"><kbd>ESPACIO</kbd> revela el siguiente · <kbd>A</kbd> todos · <kbd>R</kbd> reiniciar · pasa el ratón para resaltar</div>

<script>
const CX=190, CY=190, R=175, RIN=95;

function polar(r, deg){
    const a = (deg - 90) * Math.PI / 180;
    return { x: CX + r*Math.cos(a), y: CY + r*Math.sin(a) };
}
function sector(a0, a1){
    const p1=polar(R,a0), p2=polar(R,a1), p3=polar(RIN,a1), p4=polar(RIN,a0);
    const large = (a1 - a0) > 180 ? 1 : 0;
    return `M ${p1.x} ${p1.y} A ${R} ${R} 0 ${large} 1 ${p2.x} ${p2.y} `
         + `L ${p3.x} ${p3.y} A ${RIN} ${RIN} 0 ${large} 0 ${p4.x} ${p4.y} Z`;
}

/* Build each member's total sung seconds from the voice intervals (same rule
   as the live ranking: voice segments — possibly per-member — else start/end;
   group lines credit no one). */
function totalsFrom(song){
    const t = {};
    song.members.forEach(m => t[m.name] = 0);
    const add = (name, s, e) => { if(t[name] !== undefined && e > s) t[name] += (e - s); };
    (song.lyrics || []).forEach(line => {
        if(Array.isArray(line.voice)){
            line.voice.forEach(seg => {
                const who = seg[2] ? (Array.isArray(seg[2]) ? seg[2] : [seg[2]]) : line.members;
                who.forEach(n => add(n, seg[0], seg[1]));
            });
        } else {
            const s = line.voiceStart ?? line.start;
            const e = line.voiceEnd   ?? line.end;
            (line.members || []).forEach(n => add(n, s, e));
        }
    });
    return t;
}

let SONG, ranked = [], revealIdx = 0;

fetch("data/nctdream/moonlight.json")
  .then(r => r.json())
  .then(d => { SONG = d; build(); })
  .catch(e => { document.getElementById("sng").textContent = "Error"; console.error(e); });

function build(){
    document.getElementById("grp").textContent = SONG.group;
    document.getElementById("sng").textContent = SONG.song;

    const totals = totalsFrom(SONG);
    const sum = Math.max(0.0001, SONG.members.reduce((a,m)=>a+totals[m.name],0));

    ranked = SONG.members
        .map(m => ({ name:m.name, color:m.color, image:m.image,
                     sec:totals[m.name], pct:totals[m.name]/sum*100 }))
        .sort((a,b) => b.sec - a.sec);

    // ---- donut (segments follow ranking order, clockwise from top) ----
    const svg = document.getElementById("chart");
    let ang = 0;
    ranked.forEach(m => {
        const span = m.pct / 100 * 360;
        const path = document.createElementNS("http://www.w3.org/2000/svg","path");
        path.setAttribute("d", sector(ang, ang + span));
        path.setAttribute("class","seg");
        path.dataset.name = m.name;
        path.style.setProperty("--c", m.color);
        svg.appendChild(path);
        m.seg = path;
        ang += span;
    });

    // ---- ranking rows ----
    const rows = document.getElementById("rows");
    ranked.forEach(m => {
        const row = document.createElement("div");
        row.className = "row";
        row.dataset.name = m.name;
        row.style.setProperty("--c", m.color);
        row.style.setProperty("--rowbg",
            `color-mix(in srgb, ${m.color} 16%, var(--panel))`);
        row.innerHTML = `
            <img class="photo" src="${m.image}" alt="">
            <span class="name">${m.name}</span>
            <span class="stats">
                <span class="pct">${m.pct.toFixed(2)}%</span><br>
                <span class="sec">${m.sec.toFixed(2)}s</span>
            </span>`;
        rows.appendChild(row);
        m.row = row;
    });

    // hover a member -> emphasise its pair (dim the rest)
    ranked.forEach(m => {
        const enter = () => hover(m.name);
        const leave = () => hover(null);
        m.seg.addEventListener("mouseenter", enter);
        m.seg.addEventListener("mouseleave", leave);
        m.row.addEventListener("mouseenter", enter);
        m.row.addEventListener("mouseleave", leave);
    });
}

function setLit(m, on){
    m.seg.classList.toggle("lit", on);   // (class kept for symmetry; fill set below)
    m.seg.style.fill = on ? m.color : "";
    m.row.classList.toggle("lit", on);
}

function hover(name){
    // temporary emphasis: dim non-hovered segments
    ranked.forEach(m => {
        m.seg.classList.toggle("dim", name && m.name !== name);
    });
}

/* Reveal from the lowest up, so #1 lights last. */
function revealNext(){
    if(revealIdx >= ranked.length) return;
    const m = ranked[ranked.length - 1 - revealIdx];  // bottom-up
    setLit(m, true);
    revealIdx++;
}
function revealAll(){ ranked.forEach(m => setLit(m, true)); revealIdx = ranked.length; }
function reset(){ ranked.forEach(m => setLit(m, false)); revealIdx = 0; }

document.addEventListener("keydown", e => {
    if(e.code === "Space"){ e.preventDefault(); revealNext(); }
    else if(e.key === "a" || e.key === "A"){ revealAll(); }
    else if(e.key === "r" || e.key === "R"){ reset(); }
});
</script>
</body>
</html>
