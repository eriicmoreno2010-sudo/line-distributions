<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Line Distribution — Resultados</title>
<style>
  :root{
    --bg:#0b0b11; --panel:#15151d; --text:#f4f4f8; --muted:#7c7c8a;
    --gray:#2c2c37; --track:#1c1c25;
  }
  *{ box-sizing:border-box; }
  html,body{ margin:0; height:100%; }
  body{
    height:100vh; overflow:hidden;
    background:
        radial-gradient(120% 90% at 20% 10%, #17172a 0%, transparent 55%),
        radial-gradient(120% 90% at 90% 90%, #1a1330 0%, transparent 55%),
        var(--bg);
    color:var(--text);
    font-family:"Segoe UI",Inter,Arial,sans-serif;
  }

  #stage{ height:100vh; display:flex; flex-direction:column; padding:3.2vh 3vw; }

  #head{ flex:0 0 auto; margin-bottom:2vh; }
  #head .kick{ font-size:1.5vh; letter-spacing:.55vh; color:var(--muted); font-weight:800; }
  #head .title{ font-size:4.4vh; font-weight:900; letter-spacing:.2vh; line-height:1; }
  #head .title small{ font-weight:700; color:var(--muted); font-size:2.6vh; margin-left:1vh; }

  #main{ flex:1 1 auto; display:flex; align-items:center; gap:4vw; min-height:0; }

  /* ---------- Donut ---------- */
  #chart-wrap{ position:relative; flex:0 0 auto; height:100%; display:flex; align-items:center; }
  svg{ display:block; height:min(70vh,45vw); width:auto; filter:drop-shadow(0 2vh 4vh rgba(0,0,0,.5)); }
  .seg{
    fill:var(--gray);
    stroke:var(--bg); stroke-width:2.5;
    transition:fill .5s ease, opacity .4s ease;
    cursor:pointer;
  }
  .seg.dim{ opacity:.28; }
  #hole-label{
    position:absolute; inset:0; display:flex; flex-direction:column;
    align-items:center; justify-content:center; pointer-events:none; text-align:center;
  }
  #hole-label .grp{ font-size:1.15vh; font-weight:800; letter-spacing:.3vh; color:var(--muted); }
  #hole-label .sng{ font-size:1.7vh; font-weight:900; margin-top:.3vh; }

  /* ---------- Ranking list ---------- */
  #list{ flex:1 1 auto; height:100%; display:flex; flex-direction:column; gap:1.2vh; min-width:0; }
  .row{
    flex:1 1 0; min-height:0;
    display:grid; grid-template-columns:8vh 1fr auto; align-items:center; gap:2vh;
    background:var(--panel); border:1px solid #23232e; border-radius:1.6vh;
    padding:1.2vh 2.2vh;
    opacity:.5; transition:opacity .45s ease, background-color .45s ease,
        border-color .45s ease, box-shadow .45s ease, transform .3s ease;
  }
  .row .photo{
    width:8vh; height:8vh; border-radius:50%; object-fit:cover; object-position:center 45%;
    background:#000; filter:grayscale(1) brightness(.75);
    transition:filter .5s ease, box-shadow .5s ease;
  }
  .row .info{ min-width:0; }
  .row .name{
    font-size:3.2vh; font-weight:900; letter-spacing:.4px; color:var(--muted);
    transition:color .5s ease; line-height:1.1;
  }
  .row .bar{
    margin-top:1vh; height:1.5vh; border-radius:999px; background:var(--track); overflow:hidden;
  }
  .row .fill{
    height:100%; width:0; border-radius:999px; background:var(--gray);
    transition:width .6s cubic-bezier(.3,1,.4,1), background-color .5s ease;
  }
  .row .stats{ text-align:right; font-variant-numeric:tabular-nums; }
  .row .pct{ font-size:3vh; font-weight:900; color:var(--muted); transition:color .5s ease; line-height:1; }
  .row .sec{ font-size:1.8vh; color:var(--muted); margin-top:.5vh; }

  .row.lit{
    opacity:1; background:var(--rowbg); border-color:color-mix(in srgb, var(--c) 55%, transparent);
    box-shadow:0 1.5vh 4vh -2vh color-mix(in srgb, var(--c) 70%, transparent);
  }
  .row.lit .photo{ filter:none; box-shadow:0 0 0 .3vh var(--c); }
  .row.lit .name{ color:var(--c); }
  .row.lit .fill{ background:var(--c); }
  .row.lit .pct{ color:color-mix(in srgb, var(--c) 55%, #fff); }
  .row.lit .sec{ color:var(--text); }
  .row.dim{ opacity:.28; }

  #hint{ position:fixed; bottom:1.4vh; width:100%; text-align:center; color:#55555f; font-size:1.5vh; }
  kbd{ background:#23232e; border:1px solid #3a3a46; border-radius:5px; padding:2px 7px; font-weight:700; }
</style>
</head>
<body>
<div id="stage">
  <div id="main">
    <div id="chart-wrap">
      <svg id="chart" viewBox="0 0 400 400"></svg>
      <div id="hole-label"><div class="grp" id="grp"></div><div class="sng" id="sng"></div></div>
    </div>
    <div id="list"><div id="rows"></div></div>
  </div>
</div>
<div id="hint"><kbd>ESPACIO</kbd> revelar siguiente · <kbd>A</kbd> todos · <kbd>R</kbd> reiniciar · ratón para resaltar</div>

<script>
const CX=200, CY=200, R=185, RIN=100;
function polar(r, deg){ const a=(deg-90)*Math.PI/180; return { x:CX+r*Math.cos(a), y:CY+r*Math.sin(a) }; }
function sector(a0, a1){
    const p1=polar(R,a0), p2=polar(R,a1), p3=polar(RIN,a1), p4=polar(RIN,a0);
    const large=(a1-a0)>180?1:0;
    return `M ${p1.x} ${p1.y} A ${R} ${R} 0 ${large} 1 ${p2.x} ${p2.y} `
         + `L ${p3.x} ${p3.y} A ${RIN} ${RIN} 0 ${large} 0 ${p4.x} ${p4.y} Z`;
}

function totalsFrom(song){
    const t={}; song.members.forEach(m=>t[m.name]=0);
    const add=(n,s,e)=>{ if(t[n]!==undefined && e>s) t[n]+=(e-s); };
    (song.lyrics||[]).forEach(line=>{
        if(Array.isArray(line.voice)){
            line.voice.forEach(seg=>{
                const who = seg[2] ? (Array.isArray(seg[2])?seg[2]:[seg[2]]) : line.members;
                who.forEach(n=>add(n, seg[0], seg[1]));
            });
        } else {
            const s=line.voiceStart ?? line.start, e=line.voiceEnd ?? line.end;
            (line.members||[]).forEach(n=>add(n, s, e));
        }
    });
    return t;
}

let SONG, ranked=[], revealIdx=0;

fetch("data/nctdream/moonlight.json").then(r=>r.json())
  .then(d=>{ SONG=d; build(); })
  .catch(e=>{ document.getElementById("sng").textContent="Error"; console.error(e); });

function build(){
    document.getElementById("grp").textContent = SONG.group;
    document.getElementById("sng").textContent = SONG.song;

    const totals = totalsFrom(SONG);
    const sum = Math.max(0.0001, SONG.members.reduce((a,m)=>a+totals[m.name],0));
    ranked = SONG.members.map(m=>({ name:m.name, color:m.color, image:m.image,
                sec:totals[m.name], pct:totals[m.name]/sum*100 }))
             .sort((a,b)=>b.sec-a.sec);
    const maxPct = ranked.length ? ranked[0].pct : 1;

    // donut (ranking order, clockwise from top)
    const svg = document.getElementById("chart");
    let ang = 0;
    ranked.forEach(m=>{
        const span = m.pct/100*360;
        const path = document.createElementNS("http://www.w3.org/2000/svg","path");
        path.setAttribute("d", sector(ang, ang+span));
        path.setAttribute("class","seg");
        path.style.setProperty("--c", m.color);
        svg.appendChild(path);
        m.seg = path;
        ang += span;
    });

    // rows
    const rows = document.getElementById("rows");
    rows.style.cssText = "display:flex;flex-direction:column;gap:1.2vh;height:100%";
    ranked.forEach(m=>{
        const row = document.createElement("div");
        row.className = "row";
        row.style.setProperty("--c", m.color);
        row.style.setProperty("--rowbg", `color-mix(in srgb, ${m.color} 15%, var(--panel))`);
        row.innerHTML = `
            <img class="photo" src="${m.image}" alt="">
            <div class="info">
                <div class="name">${m.name}</div>
                <div class="bar"><div class="fill"></div></div>
            </div>
            <div class="stats">
                <div class="pct">${m.pct.toFixed(2)}%</div>
                <div class="sec">${m.sec.toFixed(2)}s</div>
            </div>`;
        rows.appendChild(row);
        m.row = row;
        m.fill = row.querySelector(".fill");
        m.fillW = (m.pct / maxPct) * 100;   // #1 bar is full
        m.fill.style.width = m.fillW + "%";  // shown grey from the start (proportional)
    });

    // hover linking
    ranked.forEach(m=>{
        const enter=()=>hover(m.name), leave=()=>hover(null);
        m.seg.addEventListener("mouseenter",enter); m.seg.addEventListener("mouseleave",leave);
        m.row.addEventListener("mouseenter",enter); m.row.addEventListener("mouseleave",leave);
    });
}

function setLit(m,on){ m.seg.style.fill = on ? m.color : ""; m.row.classList.toggle("lit", on); }
function hover(name){
    ranked.forEach(m=>{
        m.seg.classList.toggle("dim", name && m.name!==name);
        m.row.classList.toggle("dim", name && m.name!==name);
    });
}
function revealNext(){ if(revealIdx<ranked.length){ setLit(ranked[revealIdx], true); revealIdx++; } } // top-down
function revealAll(){ ranked.forEach(m=>setLit(m,true)); revealIdx=ranked.length; }
function reset(){ ranked.forEach(m=>setLit(m,false)); revealIdx=0; }

document.addEventListener("keydown", e=>{
    if(e.code==="Space"){ e.preventDefault(); revealNext(); }
    else if(e.key==="a"||e.key==="A"){ revealAll(); }
    else if(e.key==="r"||e.key==="R"){ reset(); }
});
</script>
</body>
</html>
